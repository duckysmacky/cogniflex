spring:
  datasource:
    url: "jdbc:h2:mem:cogniflex-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE"
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
      open-in-view: false
  flyway:
    enabled: false
ml:
  grpc:
    host: ${ML_GRPC_HOST:localhost}
    port: ${ML_GRPC_PORT:6565}
    timeout: ${ML_GRPC_TIMEOUT:5s}
    plaintext: ${ML_GRPC_PLAINTEXT:true}
