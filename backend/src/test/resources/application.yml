spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  datasource:
    url: "jdbc:h2:mem:cogniflex-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE"
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
      open-in-view: false
  flyway:
    enabled: false
grpc:
  ml-service:
    host: ${ML_GRPC_HOST:localhost}
    port: ${ML_GRPC_PORT:50051}
    timeout: 5s
    plaintext: true

app:
  cors:
    allowed-origins-patterns: "*"
    allowed-methods: [GET, POST, DELETE, PUT, OPTIONS]
    allowed-headers: ["*"]
    allow-credentials: true