name: Publish Images

on:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'
  workflow_dispatch:

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    name: Prepare metadata
    runs-on: ubuntu-latest
    outputs:
      backend_image_latest: ${{ steps.metadata.outputs.backend_image_latest }}
      backend_image_version: ${{ steps.metadata.outputs.backend_image_version }}
      backend_tags: ${{ steps.metadata.outputs.backend_tags }}
      is_release: ${{ steps.metadata.outputs.is_release }}
      ml_service_image_latest: ${{ steps.metadata.outputs.ml_service_image_latest }}
      ml_service_image_version: ${{ steps.metadata.outputs.ml_service_image_version }}
      ml_service_tags: ${{ steps.metadata.outputs.ml_service_tags }}
      registry_username: ${{ steps.metadata.outputs.registry_username }}
      version: ${{ steps.metadata.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail

          owner="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          image_prefix="ghcr.io/${owner}"

          is_release="false"
          version=""

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+(\.[0-9]+){2,3}$ ]]; then
              echo "Tag '${GITHUB_REF_NAME}' must look like v1.2.3 or v1.2.3.4" >&2
              exit 1
            fi

            git fetch origin master:refs/remotes/origin/master --tags
            tag_commit="$(git rev-list -n 1 "${GITHUB_REF_NAME}")"
            master_commit="$(git rev-parse origin/master)"
            if [[ "${tag_commit}" != "${master_commit}" ]]; then
              echo "Tag '${GITHUB_REF_NAME}' must point to the current origin/master commit" >&2
              exit 1
            fi

            is_release="true"
            version="${GITHUB_REF_NAME#v}"
          fi

          echo "registry_username=${owner}" >> "$GITHUB_OUTPUT"
          echo "is_release=${is_release}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "backend_image_latest=${image_prefix}/cogniflex-backend:latest" >> "$GITHUB_OUTPUT"
          echo "ml_service_image_latest=${image_prefix}/cogniflex-ml-service:latest" >> "$GITHUB_OUTPUT"

          {
            echo "backend_tags<<EOF"
            echo "${image_prefix}/cogniflex-backend:latest"
            if [[ "${is_release}" == "true" ]]; then
              echo "${image_prefix}/cogniflex-backend:${version}"
            fi
            echo "EOF"
            echo "ml_service_tags<<EOF"
            echo "${image_prefix}/cogniflex-ml-service:latest"
            if [[ "${is_release}" == "true" ]]; then
              echo "${image_prefix}/cogniflex-ml-service:${version}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [[ "${is_release}" == "true" ]]; then
            echo "backend_image_version=${image_prefix}/cogniflex-backend:${version}" >> "$GITHUB_OUTPUT"
            echo "ml_service_image_version=${image_prefix}/cogniflex-ml-service:${version}" >> "$GITHUB_OUTPUT"
          fi

  build-images:
    name: Build and publish Docker images
    runs-on: ubuntu-latest
    needs: prepare
    timeout-minutes: 60
    outputs:
      backend_digest: ${{ steps.backend_image.outputs.digest }}
      ml_service_digest: ${{ steps.ml_service_image.outputs.digest }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        id: backend_image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          tags: ${{ needs.prepare.outputs.backend_tags }}

      - name: Build and push ML service image
        id: ml_service_image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ml-service/Dockerfile
          push: true
          cache-from: type=gha,scope=ml-service
          cache-to: type=gha,mode=max,scope=ml-service
          tags: ${{ needs.prepare.outputs.ml_service_tags }}

  metadata:
    name: Upload publish metadata
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-images

    steps:
      - name: Write publish metadata
        env:
          BACKEND_DIGEST: ${{ needs.build-images.outputs.backend_digest }}
          BACKEND_IMAGE_LATEST: ${{ needs.prepare.outputs.backend_image_latest }}
          BACKEND_IMAGE_VERSION: ${{ needs.prepare.outputs.backend_image_version }}
          IS_RELEASE: ${{ needs.prepare.outputs.is_release }}
          ML_SERVICE_DIGEST: ${{ needs.build-images.outputs.ml_service_digest }}
          ML_SERVICE_IMAGE_LATEST: ${{ needs.prepare.outputs.ml_service_image_latest }}
          ML_SERVICE_IMAGE_VERSION: ${{ needs.prepare.outputs.ml_service_image_version }}
          REGISTRY_USERNAME: ${{ needs.prepare.outputs.registry_username }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          {
            echo "backend_digest=${BACKEND_DIGEST}"
            echo "backend_image_latest=${BACKEND_IMAGE_LATEST}"
            echo "backend_image_version=${BACKEND_IMAGE_VERSION}"
            echo "is_release=${IS_RELEASE}"
            echo "ml_service_digest=${ML_SERVICE_DIGEST}"
            echo "ml_service_image_latest=${ML_SERVICE_IMAGE_LATEST}"
            echo "ml_service_image_version=${ML_SERVICE_IMAGE_VERSION}"
            echo "registry_username=${REGISTRY_USERNAME}"
            echo "version=${VERSION}"
          } > publish-metadata.env

      - name: Upload publish metadata
        uses: actions/upload-artifact@v4
        with:
          name: publish-metadata
          path: publish-metadata.env
          if-no-files-found: error