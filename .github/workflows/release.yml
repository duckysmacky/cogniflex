name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  actions: read
  contents: write
  packages: write

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag
        id: metadata
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+(\.[0-9]+){2,3}$ ]]; then
            echo "Tag '${GITHUB_REF_NAME}' must look like v1.2.3 or v1.2.3.4" >&2
            exit 1
          fi

          git fetch origin master:refs/remotes/origin/master --tags --force
          tag_commit="$(git rev-list -n 1 "${GITHUB_REF_NAME}")"
          master_commit="$(git rev-parse origin/master)"
          if [[ "${tag_commit}" != "${master_commit}" ]]; then
            echo "Tag '${GITHUB_REF_NAME}' must point to the current origin/master commit" >&2
            exit 1
          fi

          owner="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          version="${GITHUB_REF_NAME#v}"
          image_prefix="ghcr.io/${owner}"

          echo "registry_username=${owner}" >> "$GITHUB_OUTPUT"
          echo "tag_commit=${tag_commit}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "backend_image_sha=${image_prefix}/cogniflex-backend:${tag_commit}" >> "$GITHUB_OUTPUT"
          echo "backend_image_version=${image_prefix}/cogniflex-backend:${version}" >> "$GITHUB_OUTPUT"
          echo "ml_service_image_sha=${image_prefix}/cogniflex-ml-service:${tag_commit}" >> "$GITHUB_OUTPUT"
          echo "ml_service_image_version=${image_prefix}/cogniflex-ml-service:${version}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for Publish Images workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_COMMIT: ${{ steps.metadata.outputs.tag_commit }}
        run: |
          set -euo pipefail

          run_id=""

          for attempt in {1..90}; do
            run_id="$(
              gh run list \
                --repo "${GH_REPO}" \
                --workflow "Publish Images" \
                --branch master \
                --commit "${TAG_COMMIT}" \
                --json databaseId \
                --jq '.[0].databaseId // ""'
            )"

            if [[ -n "${run_id}" ]]; then
              break
            fi

            sleep 20
          done

          if [[ -z "${run_id}" ]]; then
            echo "Could not find a Publish Images run for commit ${TAG_COMMIT}" >&2
            exit 1
          fi

          echo "Waiting for Publish Images run ${run_id}"
          gh run watch "${run_id}" --repo "${GH_REPO}" --exit-status --interval 30

      - name: Verify published SHA images
        env:
          BACKEND_IMAGE_SHA: ${{ steps.metadata.outputs.backend_image_sha }}
          ML_SERVICE_IMAGE_SHA: ${{ steps.metadata.outputs.ml_service_image_sha }}
        run: |
          set -euo pipefail

          for image in "${BACKEND_IMAGE_SHA}" "${ML_SERVICE_IMAGE_SHA}"; do
            docker buildx imagetools inspect "${image}" >/dev/null
          done

      - name: Tag release images
        env:
          BACKEND_IMAGE_SHA: ${{ steps.metadata.outputs.backend_image_sha }}
          BACKEND_IMAGE_VERSION: ${{ steps.metadata.outputs.backend_image_version }}
          ML_SERVICE_IMAGE_SHA: ${{ steps.metadata.outputs.ml_service_image_sha }}
          ML_SERVICE_IMAGE_VERSION: ${{ steps.metadata.outputs.ml_service_image_version }}
        run: |
          docker buildx imagetools create \
            --tag "${BACKEND_IMAGE_VERSION}" \
            "${BACKEND_IMAGE_SHA}"

          docker buildx imagetools create \
            --tag "${ML_SERVICE_IMAGE_VERSION}" \
            "${ML_SERVICE_IMAGE_SHA}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: extension/.nvmrc
          cache: yarn
          cache-dependency-path: extension/yarn.lock

      - name: Build extension
        working-directory: extension
        env:
          EXTENSION_VERSION: ${{ steps.metadata.outputs.version }}
        run: |
          yarn install --frozen-lockfile
          yarn build

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.metadata.outputs.version }}
          BACKEND_IMAGE: ${{ steps.metadata.outputs.backend_image_version }}
          ML_SERVICE_IMAGE: ${{ steps.metadata.outputs.ml_service_image_version }}
        run: |
          cat > release-notes.md <<EOF
          Docker images:

          - Backend: \`${BACKEND_IMAGE}\`
          - ML service: \`${ML_SERVICE_IMAGE}\`

          Extension build:

          - \`cogniflex-extension-${VERSION}.zip\`
          EOF

          gh release create "v${VERSION}" \
            "extension/release/cogniflex-extension-${VERSION}.zip" \
            --title "Cogniflex ${VERSION}" \
            --notes-file release-notes.md \
            --draft \
            --verify-tag
