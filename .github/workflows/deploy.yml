name: Deploy

on:
  workflow_run:
    workflows:
      - Publish Images
    types:
      - completed

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  deploy:
    name: Deploy application
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    timeout-minutes: 30

    steps:
      - name: Download publish metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: gh run download "${RUN_ID}" --repo "${GH_REPO}" --name publish-metadata --dir .

      - name: Read publish metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          cat publish-metadata.env >> "$GITHUB_OUTPUT"

      - name: Deploy application over SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          command_timeout: 60m
          script: |
            export APP_DIR="${{ secrets.SERVER_DEPLOY_PATH }}"
            export DEPLOY_BRANCH="master"
            export REGISTRY="ghcr.io"
            export REGISTRY_USERNAME="${{ steps.metadata.outputs.registry_username }}"
            export REGISTRY_TOKEN="${{ secrets.SERVER_REGISTRY_TOKEN }}"
            bash "$APP_DIR/deploy.sh"
