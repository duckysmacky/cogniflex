name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Build, publish, and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Derive registry username
        id: vars
        run: |
          owner="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "registry_username=${owner}" >> "$GITHUB_OUTPUT"

      - name: Detect image changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'proto/**'
              - 'docker-compose.yml'
              - '.dockerignore'
            ml_service:
              - 'ml-service/**'
              - 'proto/**'
              - 'docker-compose.yml'
              - '.dockerignore'

      - name: Set up Docker Buildx
        if: steps.changes.outputs.backend == 'true' || steps.changes.outputs.ml_service == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.changes.outputs.backend == 'true' || steps.changes.outputs.ml_service == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        if: steps.changes.outputs.backend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          tags: |
            ghcr.io/${{ steps.vars.outputs.registry_username }}/cogniflex-backend:latest
            ghcr.io/${{ steps.vars.outputs.registry_username }}/cogniflex-backend:${{ github.sha }}

      - name: Build and push ML service image
        if: steps.changes.outputs.ml_service == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ml-service/Dockerfile
          push: true
          cache-from: type=gha,scope=ml-service
          cache-to: type=gha,mode=max,scope=ml-service
          tags: |
            ghcr.io/${{ steps.vars.outputs.registry_username }}/cogniflex-ml-service:latest
            ghcr.io/${{ steps.vars.outputs.registry_username }}/cogniflex-ml-service:${{ github.sha }}

      - name: Skip image builds
        if: steps.changes.outputs.backend != 'true' && steps.changes.outputs.ml_service != 'true'
        run: echo "No image-related changes detected, reusing latest published images."

      - name: Deploy application over SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          command_timeout: 60m
          script: |
            export APP_DIR="${{ secrets.SERVER_DEPLOY_PATH }}"
            export DEPLOY_BRANCH="master"
            export REGISTRY="ghcr.io"
            export REGISTRY_USERNAME="${{ steps.vars.outputs.registry_username }}"
            export REGISTRY_TOKEN="${{ secrets.SERVER_REGISTRY_TOKEN }}"
            bash "$APP_DIR/deploy.sh"
