name: cogniflex

services:
  db:
    image: postgres:17
    container_name: cogniflex-db
    env_file:
        - backend/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
  redis:
    image: redis:7
    container_name: cogniflex-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: