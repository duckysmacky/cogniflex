name: cogniflex

services:
  db:
    image: postgres:18
    container_name: cogniflex-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - cogniflex-network

  redis:
    image: redis:8
    container_name: cogniflex-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cogniflex-network

  backend:
    build: backend/
    image: cogniflex-backend:latest
    container_name: cogniflex-backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - ML_GRPC_HOST=${ML_GRPC_HOST:-host.docker.internal}
      - ML_GRPC_PORT=${ML_GRPC_PORT:-50051}
      - SERVER_PORT=8080
    depends_on:
      - db
    networks:
      - cogniflex-network

  ml-service:
    build:
      context: ./ml-service     # Путь к папке с сервисом от корня
      dockerfile: Dockerfile    # Имя файла
    image: cogniflex-ml-service:latest  # Как ты и просил
    container_name: ml-service
    ports:
      - "50051:50051"           # Пробрасываем gRPC порт
    environment:
      - PORT=50051
    networks:
      - cogniflex-network

networks:
  cogniflex-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
