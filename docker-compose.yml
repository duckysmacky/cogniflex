name: cogniflex

services:
  db:
    image: postgres:18
    container_name: cogniflex-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - cogniflex-network
    
  redis:
    image: redis:8
    container_name: cogniflex-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cogniflex-network

  backend:
    build: backend/
    image: cogniflex-backend:latest
    container_name: cogniflex-backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db 
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      - db
    networks:
      - cogniflex-network

networks:
  cogniflex-network:
    driver: bridge


volumes:
  postgres_data:
  redis_data:
